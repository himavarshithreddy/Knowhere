name: Change Domain

on:
  workflow_dispatch:
    inputs:
      old_domain:
        description: 'Old Domain Name to replace (e.g., knowhere.himavarshithreddy.in)'
        required: true
        default: 'knowhere.himavarshithreddy.in'
      new_domain:
        description: 'New Domain Name (e.g., knowhere.com)'
        required: true
        default: 'theknowhere.space'
      email:
        description: 'Email for Let''s Encrypt SSL Certificate'
        required: true
        default: 'gundamhimavarshith@gmail.com'

jobs:
  migrate_domain:
    name: Migrate VPS to New Domain
    runs-on: ubuntu-latest

    steps:
      - name: Execute Domain Migration via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            OLD_DOMAIN="${{ github.event.inputs.old_domain }}"
            DOMAIN="${{ github.event.inputs.new_domain }}"
            EMAIL="${{ github.event.inputs.email }}"
            ENV_FILE="/var/www/knowhere/server/.env"
            NGINX_CONF="/etc/nginx/sites-available/knowhere"
            WEB_DIR="/var/www/knowhere/web"
            
            echo "1. Resetting Nginx Configuration for new domain..."
            # Write a fresh HTTP template to wipe out any old Certbot configs that cause conflicts
            sudo tee "$NGINX_CONF" > /dev/null << 'EOF'
            server {
                listen 80;
                server_name DOMAIN_PLACEHOLDER;

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                    
                    add_header X-Frame-Options "SAMEORIGIN";
                    add_header X-XSS-Protection "1; mode=block";
                    add_header X-Content-Type-Options "nosniff";
                }
            }
            EOF
            sudo sed -i "s/DOMAIN_PLACEHOLDER/$DOMAIN/g" "$NGINX_CONF"
            sudo nginx -t
            sudo systemctl reload nginx
            
            echo "2. Requesting SSL Certificate via Certbot..."
            # Certbot will cleanly add SSL to the fresh Nginx template
            sudo certbot --nginx -d "$DOMAIN" --non-interactive --agree-tos -m "$EMAIL" --redirect

            echo "3. Updating Frontend Domain Environment Variable and rebuilding..."
            cd "$WEB_DIR"
            # Update the domain environment variable for Vite to inject into index.html
            if grep -q "^VITE_APP_DOMAIN=" .env.local 2>/dev/null || grep -q "^VITE_APP_DOMAIN=" .env.production 2>/dev/null; then
              sudo sed -i "s|^VITE_APP_DOMAIN=.*|VITE_APP_DOMAIN=https://$DOMAIN|" .env.local || sudo sed -i "s|^VITE_APP_DOMAIN=.*|VITE_APP_DOMAIN=https://$DOMAIN|" .env.production
            else
              echo "VITE_APP_DOMAIN=https://$DOMAIN" | sudo tee -a .env.local > /dev/null
            fi
            
            npm install
            npm run build

            echo "4. Updating CLIENT_URL in server/.env..."
            if grep -q "^CLIENT_URL=" "$ENV_FILE"; then
              sudo sed -i "s|^CLIENT_URL=.*|CLIENT_URL=https://$DOMAIN|" "$ENV_FILE"
            else
              echo "CLIENT_URL=https://$DOMAIN" | sudo tee -a "$ENV_FILE" > /dev/null
            fi

            echo "5. Reloading PM2 to apply Environment Variables..."
            cd /var/www/knowhere
            pm2 reload knowhere
            pm2 save
            
            echo "🎉 Domain migration from $OLD_DOMAIN to $DOMAIN complete!"
