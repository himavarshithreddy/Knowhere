name: Manual Deployment

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Fail immediately on any error
            set -e

            # Navigate to the project directory
            cd /var/www/knowhere
            
            # Pull the latest changes (and force overwrite any local conflicts)
            git fetch origin
            git checkout ${{ github.event.inputs.branch }}
            git reset --hard origin/${{ github.event.inputs.branch }}
            
            # Install exact dependencies securely and reproducibly
            npm ci
            
            # Build the project with optimized memory limits for low-RAM VPS (utilizing swap)
            export NODE_OPTIONS="--max-old-space-size=2048"
            npm run build
            
            # Zero-downtime reload of the Node.js server
            pm2 reload knowhere
            pm2 reload knowhere-mcp || pm2 start npm --name "knowhere-mcp" -- run mcp:start
            
            # Save the PM2 process list
            pm2 save
